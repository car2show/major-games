<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Major.Games</title>

    <meta
        name="description"
        content="Major.Games — premium gaming brand available for strategic acquisition.">

    <meta
        name="theme-color"
        content="#05060c">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">

    <link
        rel="icon"
        type="image/png"
        href="favicon.png">

    <link
        rel="apple-touch-icon"
        href="favicon.png">

    <!-- Open Graph -->
    <meta
        property="og:title"
        content="Major.Games">

    <meta
        property="og:description"
        content="Premium gaming brand available for strategic acquisition.">

    <meta
        property="og:type"
        content="website">

    <!-- Twitter -->
    <meta
        name="twitter:card"
        content="summary_large_image">

    <meta
        name="twitter:title"
        content="Major.Games">

    <meta
        name="twitter:description"
        content="Premium gaming brand available for strategic acquisition.">

    <style>

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg: #05060c;
            --text: #ffffff;
            --muted: #a1a4c7;
            --purple: #8b5cf6;
        }

        html,
        body {
            min-height: 100%;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;

            font-family: 'Inter', sans-serif;

            background:
                radial-gradient(
                    circle at top,
                    rgba(139, 92, 246, 0.18),
                    transparent 45%
                ),
                radial-gradient(
                    circle at bottom,
                    rgba(59, 130, 246, 0.08),
                    transparent 40%
                ),
                var(--bg);

            color: var(--text);

            display: flex;
            align-items: center;
            justify-content: center;

            min-height: 100vh;

            padding: 24px;

            overflow-x: hidden;
            overflow-y: auto;

            animation: fadeIn 1s ease;
        }

        body::after {
            content: "";

            position: fixed;
            inset: 0;

            pointer-events: none;

            opacity: 0.03;

            background-image:
                radial-gradient(
                    rgba(255,255,255,0.35) 0.5px,
                    transparent 0.5px
                );

            background-size: 3px 3px;
        }

        .container {
            position: relative;

            width: 100%;
            max-width: 470px;

            padding: 42px 34px;

            background: rgba(255,255,255,0.03);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius: 28px;

            backdrop-filter: blur(16px);

            text-align: center;

            box-shadow:
                0 25px 60px rgba(0,0,0,0.55);

            overflow: hidden;
        }

        .container::before {
            content: "";

            position: absolute;
            inset: -80px;

            background:
                radial-gradient(
                    circle,
                    rgba(139,92,246,0.12),
                    transparent 70%
                );

            z-index: -1;

            filter: blur(40px);
        }

        .main-logo {
            width: 100%;
            max-width: 220px;

            display: block;

            margin:
                0 auto 26px;

            object-fit: contain;

            filter:
                drop-shadow(
                    0 0 24px rgba(139,92,246,0.22)
                );

            opacity: 0;

            transform: translateY(8px);

            animation:
                reveal 1s cubic-bezier(0.22,1,0.36,1) forwards,
                float 7s ease-in-out infinite 1s;
        }

        h1 {
            margin:
                0 0 12px;

            font-family: 'Orbitron', sans-serif;

            font-size: 32px;

            font-weight: 700;

            letter-spacing: 1.5px;

            background:
                linear-gradient(
                    to bottom,
                    #ffffff,
                    #a855f7
                );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            opacity: 0;

            transform: translateY(6px);

            animation:
                reveal 1s ease forwards;

            animation-delay: 0.15s;
        }

        p {
            margin:
                0 0 34px;

            color: var(--muted);

            font-size: 15px;

            line-height: 1.7;

            opacity: 0;

            transform: translateY(6px);

            animation:
                reveal 1s ease forwards;

            animation-delay: 0.3s;
        }

        form {
            display: flex;
            flex-direction: column;

            gap: 15px;

            opacity: 0;

            transform: translateY(8px);

            animation:
                reveal 1s ease forwards;

            animation-delay: 0.45s;
        }

        input,
        textarea {
            width: 100%;

            padding: 16px;

            border-radius: 14px;

            border:
                1px solid rgba(255,255,255,0.1);

            background:
                rgba(255,255,255,0.05);

            color: #fff;

            font-family: inherit;

            font-size: 15px;

            transition:
                border-color 0.25s ease,
                background 0.25s ease,
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color:
                rgba(255,255,255,0.34);
        }

        textarea {
            resize: none;
        }

        input:focus,
        textarea:focus {
            outline: none;

            border-color: var(--purple);

            background:
                rgba(255,255,255,0.08);

            box-shadow:
                0 0 0 4px rgba(139,92,246,0.12),
                0 0 24px rgba(139,92,246,0.08);
        }

        button {
            padding: 16px;

            border: none;
            border-radius: 14px;

            background:
                linear-gradient(
                    135deg,
                    #8b5cf6,
                    #6d28d9
                );

            color: white;

            cursor: pointer;

            font-family: inherit;

            font-size: 15px;
            font-weight: 600;

            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease,
                opacity 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px);

            box-shadow:
                0 14px 30px rgba(109,40,217,0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: default;
        }

        .success {
            margin-top: 16px;

            padding: 13px 14px;

            border-radius: 12px;

            background:
                rgba(139,92,246,0.1);

            border:
                1px solid rgba(139,92,246,0.16);

            color: #c4b5fd;

            font-size: 14px;
            font-weight: 500;

            opacity: 0;

            transform: translateY(6px);

            pointer-events: none;

            transition:
                opacity 0.35s ease,
                transform 0.35s ease;
        }

        .success.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 26px;

            color:
                rgba(255,255,255,0.28);

            font-size: 11px;

            font-weight: 600;

            letter-spacing: 1.4px;

            text-transform: uppercase;

            opacity: 0;

            animation:
                fadeOnly 1s ease forwards;

            animation-delay: 0.65s;
        }

        @keyframes reveal {

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOnly {

            to {
                opacity: 1;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 540px) {

            .container {
                padding: 36px 24px;
            }

            .main-logo {
                max-width: 180px;
            }

            h1 {
                font-size: 26px;
            }

            p {
                font-size: 14px;
            }

            input,
            textarea,
            button {
                font-size: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <img
        src="top-logo.png"
        alt="Major.Games"
        class="main-logo">

    <h1>
        MAJOR.GAMES
    </h1>

    <p>
        Premium gaming brand for esports,
        media, infrastructure and next-generation gaming ventures.<br>
        Available for strategic acquisition.
    </p>

    <form id="offerForm">

        <input
            type="text"
            name="name"
            placeholder="Name / Organization"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your contact email"
            inputmode="email"
            required>

        <textarea
            name="message"
            placeholder="Offer or inquiry details"
            rows="4"
            required></textarea>

        <button
            type="submit"
            id="submitButton">
            Make an Offer
        </button>

    </form>

    <div
        class="success"
        id="successMsg">
        Your offer has been received.
    </div>

    <div class="footer-text">
        AVAILABLE FOR STRATEGIC ACQUISITION
    </div>

</div>

<script>

    const form =
        document.getElementById('offerForm');

    const button =
        document.getElementById('submitButton');

    const success =
        document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        button.disabled = true;

        button.textContent =
            'Sending...';

        const formData =
            new FormData(form);

        try {

            const response = await fetch(
                'https://formspree.io/f/mnjroklb',
                {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                }
            );

            if (response.ok) {

                form.reset();

                success.classList.add('visible');

                button.textContent =
                    'Offer Sent';

                setTimeout(() => {

                    button.disabled = false;

                    button.textContent =
                        'Make an Offer';

                    success.classList.remove('visible');

                }, 2600);

            } else {

                throw new Error();
            }

        } catch (error) {

            alert(
                'Unable to send inquiry.'
            );

            button.disabled = false;

            button.textContent =
                'Make an Offer';
        }

    });

</script>

</body>
</html>
